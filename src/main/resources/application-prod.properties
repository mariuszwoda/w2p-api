# Production environment configuration

# PostgreSQL Database configuration for Azure
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:calendardb}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate dialect for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging configuration
logging.level.pl.where2play=INFO
logging.level.org.springframework=INFO

# Security configuration
spring.security.csrf.enabled=true

# Azure-specific configuration
azure.deployment.slot=${AZURE_DEPLOYMENT_SLOT:production}

# Connection pool configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

# Redis configuration for production
spring.cache.type=redis
spring.cache.redis.time-to-live=3600
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.client-type=lettuce
spring.data.redis.connect-timeout=2000
