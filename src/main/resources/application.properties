spring.application.name=w2p-api
server.port=8080

# Active profile configuration
spring.profiles.active=dev

# Common database configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Liquibase configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# Common security configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/calendar

spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:your-facebook-client-id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:your-facebook-client-secret}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile

spring.security.oauth2.client.registration.twitter.client-id=${TWITTER_CLIENT_ID:your-twitter-client-id}
spring.security.oauth2.client.registration.twitter.client-secret=${TWITTER_CLIENT_SECRET:your-twitter-client-secret}
spring.security.oauth2.client.registration.twitter.scope=tweet.read,users.read,offline.access

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

spring.security.oauth2.client.registration.microsoft.client-id=${MICROSOFT_CLIENT_ID:your-microsoft-client-id}
spring.security.oauth2.client.registration.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET:your-microsoft-client-secret}
spring.security.oauth2.client.registration.microsoft.scope=openid,profile,email,Calendars.ReadWrite

spring.security.oauth2.client.registration.apple.client-id=${APPLE_CLIENT_ID:your-apple-client-id}
spring.security.oauth2.client.registration.apple.client-secret=${APPLE_CLIENT_SECRET:your-apple-client-secret}
spring.security.oauth2.client.registration.apple.scope=name,email

# JWT configuration
jwt.secret=${JWT_SECRET:a-very-long-and-secure-jwt-secret-key-that-is-at-least-256-bits-long-for-hmac-sha-algorithms}
jwt.expiration=86400000

# Actuator configuration
management.endpoints.web.exposure.include=health,info,metrics

# Swagger/OpenAPI configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true

# Redis configuration (common settings)
spring.cache.type=redis
spring.cache.redis.time-to-live=3600
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
